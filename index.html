<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>IGNITE CAPS Building Tour – WebXR Exhibit</title>
  <meta name="description" content="An immersive WebXR virtual reality tour of the CAPS Building, presented at the IGNITE Summit." />

  <!-- A-Frame 1.5.0 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- aframe-extras for locomotion / teleport -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    /* ── Reset & Base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      overflow: hidden;
    }

    /* ── Loading Screen ─────────────────────────────────────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.6s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      animation: pulse-logo 1.8s ease-in-out infinite;
    }
    @keyframes pulse-logo {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(233,69,96,0.5); }
      50% { transform: scale(1.08); box-shadow: 0 0 0 18px rgba(233,69,96,0); }
    }
    .loading-title {
      color: #fff;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .loading-sub {
      color: rgba(255,255,255,0.55);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
    }
    .loading-bar-track {
      width: 220px;
      height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #533483);
      border-radius: 999px;
      animation: loading-progress 2.8s ease-in-out forwards;
    }
    @keyframes loading-progress {
      0%   { width: 0%; }
      60%  { width: 75%; }
      100% { width: 100%; }
    }

    /* ── HUD Overlay ────────────────────────────────────────────── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(26,26,46,0.85) 0%, transparent 100%);
    }
    .hud-title {
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    }
    .hud-title span {
      color: #e94560;
    }
    .hud-hint {
      color: rgba(255,255,255,0.65);
      font-size: 0.72rem;
      text-align: right;
      line-height: 1.5;
    }

    /* ── Info Panel ─────────────────────────────────────────────── */
    #info-panel {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      z-index: 200;
      width: min(480px, calc(100vw - 32px));
      background: rgba(15, 15, 35, 0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(233,69,96,0.35);
      border-radius: 16px;
      padding: 24px 24px 20px;
      color: #fff;
      opacity: 0;
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.35s ease;
      pointer-events: none;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
    }
    #info-panel.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .panel-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #533483);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    #panel-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      flex: 1;
      padding-top: 6px;
    }
    #close-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    #close-btn:hover {
      background: rgba(233,69,96,0.3);
      color: #fff;
    }
    #panel-desc {
      font-size: 0.9rem;
      line-height: 1.65;
      color: rgba(255,255,255,0.78);
      margin-top: 4px;
    }
    .panel-audio-indicator {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
    }
    .audio-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #e94560;
      animation: audio-pulse 1.2s ease-in-out infinite;
    }
    @keyframes audio-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }
    .panel-audio-indicator.idle .audio-dot { animation: none; background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>

<!-- ── Loading Screen ─────────────────────────────────────────── -->
<div id="loading-screen">
  <div class="loading-logo">🏛️</div>
  <div class="loading-title">Loading CAPS Building…</div>
  <div class="loading-sub">IGNITE Summit VR Exhibit</div>
  <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
</div>

<!-- ── HUD ───────────────────────────────────────────────────── -->
<div id="hud">
  <div class="hud-title"><span>IGNITE</span> CAPS Building Tour</div>
  <div class="hud-hint">Look at or click a marker<br>to learn more</div>
</div>

<!-- ── Info Panel ────────────────────────────────────────────── -->
<div id="info-panel" role="dialog" aria-modal="true" aria-labelledby="panel-title">
  <div class="panel-header">
    <div class="panel-icon">📍</div>
    <div id="panel-title">Point of Interest</div>
    <button id="close-btn" aria-label="Close info panel">✕</button>
  </div>
  <div id="panel-desc">Select a marker to learn more.</div>
  <div class="panel-audio-indicator idle" id="audio-indicator">
    <div class="audio-dot"></div>
    <span id="audio-status">No audio</span>
  </div>
</div>

<!-- ── A-Frame Scene ─────────────────────────────────────────── -->
<a-scene
  id="main-scene"
  loading-screen="enabled: false"
  renderer="antialias: true; maxCanvasWidth: 1920; maxCanvasHeight: 1920; logarithmicDepthBuffer: true"
  vr-mode-ui="enabled: true"
  device-orientation-permission-ui="enabled: true"
  shadow="type: pcfsoft"
>

  <!-- ── Assets ──────────────────────────────────────────────── -->
  <a-assets timeout="30000">
    <a-asset-item id="building-model" src="assets/model.glb" response-type="arraybuffer"></a-asset-item>
    <audio id="audio-poi-1" src="assets/audio/poi-1.mp3" preload="none" crossorigin="anonymous"></audio>
    <audio id="audio-poi-2" src="assets/audio/poi-2.mp3" preload="none" crossorigin="anonymous"></audio>
    <audio id="audio-poi-3" src="assets/audio/poi-3.mp3" preload="none" crossorigin="anonymous"></audio>
    <audio id="audio-poi-4" src="assets/audio/poi-4.mp3" preload="none" crossorigin="anonymous"></audio>
  </a-assets>

  <!-- ── Sky / Environment ────────────────────────────────────── -->
  <a-sky color="#1a1a2e"></a-sky>

  <!-- Ground plane (fallback while GLB loads) -->
  <a-plane
    position="0 0 0"
    rotation="-90 0 0"
    width="60" height="60"
    color="#0d0d1a"
    roughness="0.9"
    metalness="0.1"
    shadow="receive: true">
  </a-plane>

  <!-- ── Building Model ───────────────────────────────────────── -->
  <a-entity
    id="building"
    gltf-model="#building-model"
    position="0 0 0"
    scale="1 1 1"
    shadow="cast: true; receive: true">
  </a-entity>

  <!-- ── Lighting ─────────────────────────────────────────────── -->
  <a-light type="ambient" color="#334466" intensity="0.9"></a-light>
  <a-light
    type="directional"
    color="#ffffff"
    intensity="1.4"
    position="8 16 6"
    cast-shadow="true"
    shadow-map-width="2048"
    shadow-map-height="2048">
  </a-light>
  <a-light type="point" color="#e94560" intensity="0.5" position="0 4 -5" distance="15"></a-light>

  <!-- ── Camera Rig (Desktop + Mobile + VR) ───────────────────── -->
  <a-entity id="rig" position="0 0 2" movement-controls="fly: false; speed: 0.15">
    <a-camera
      id="cam"
      look-controls="pointerLockEnabled: false; reverseMouseDrag: false"
      wasd-controls="enabled: false"
      position="0 1.65 0"
      near="0.05"
      far="500">

      <!-- Gaze cursor for mobile / phone WebXR -->
      <a-entity
        id="gaze-cursor"
        cursor="fuse: true; fuseTimeout: 1500; rayOrigin: entity"
        position="0 0 -1"
        geometry="primitive: ring; radiusInner: 0.012; radiusOuter: 0.018"
        material="color: #e94560; shader: flat; opacity: 0.85"
        animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 1 1 1; to: 0.1 0.1 0.1"
        animation__clickback="property: scale; startEvents: animationcomplete__click; easing: easeOutCubic; dur: 300; from: 0.1 0.1 0.1; to: 1 1 1"
        animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
        animation__fusingstop="property: scale; startEvents: mouseleave; easing: easeOutCubic; dur: 200; from: 0.1 0.1 0.1; to: 1 1 1"
        raycaster="objects: [poi-marker]; interval: 60">
      </a-entity>
    </a-camera>

    <!-- VR left hand – teleport -->
    <a-entity
      id="left-hand"
      teleport-controls="cameraRig: #rig; teleportOrigin: #cam; button: trigger; collisionEntities: .collidable"
      vive-controls="hand: left"
      oculus-touch-controls="hand: left"
      windows-motion-controls="hand: left">
    </a-entity>

    <!-- VR right hand – teleport -->
    <a-entity
      id="right-hand"
      teleport-controls="cameraRig: #rig; teleportOrigin: #cam; button: trigger; collisionEntities: .collidable"
      vive-controls="hand: right"
      oculus-touch-controls="hand: right"
      windows-motion-controls="hand: right">
    </a-entity>
  </a-entity>

  <!-- Invisible ground for teleport collision -->
  <a-plane
    class="collidable"
    position="0 0.01 0"
    rotation="-90 0 0"
    width="60" height="60"
    visible="false">
  </a-plane>

  <!-- ── POI Markers ───────────────────────────────────────────── -->

  <!-- POI 1: Main Entrance -->
  <a-entity
    id="poi-1"
    poi-marker="
      title: Main Entrance;
      description: Welcome to the CAPS building. This is your starting point for the virtual tour.;
      audio: audio-poi-1;
      color: #e94560"
    position="0 1.5 -5">
  </a-entity>

  <!-- POI 2: Innovation Lab -->
  <a-entity
    id="poi-2"
    poi-marker="
      title: Innovation Lab;
      description: Where students build real-world projects using cutting-edge tools and technology.;
      audio: audio-poi-2;
      color: #533483"
    position="5 1.5 -5">
  </a-entity>

  <!-- POI 3: Collaboration Space -->
  <a-entity
    id="poi-3"
    poi-marker="
      title: Collaboration Space;
      description: Open area designed for team projects, brainstorming, and peer learning.;
      audio: audio-poi-3;
      color: #0f3460"
    position="-5 1.5 -5">
  </a-entity>

  <!-- POI 4: Studio -->
  <a-entity
    id="poi-4"
    poi-marker="
      title: Studio;
      description: Creative and media production studio — video, audio, and digital art production.;
      audio: audio-poi-4;
      color: #16213e"
    position="0 1.5 -10">
  </a-entity>

</a-scene>

<!-- ── Components & Logic ─────────────────────────────────────── -->
<script>
// ─ Detect mobile ──────────────────────────────────────────────
const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

// ─ Renderer tweak for mobile ──────────────────────────────────
if (isMobile) {
  const scene = document.querySelector('a-scene');
  scene.setAttribute('renderer', {
    antialias: false,
    maxCanvasWidth: 1280,
    maxCanvasHeight: 1280,
    logarithmicDepthBuffer: true
  });
}

// ─────────────────────────────────────────────────────────────
//  poi-marker  component
// ─────────────────────────────────────────────────────────────
AFRAME.registerComponent('poi-marker', {
  schema: {
    title:       { type: 'string', default: 'Point of Interest' },
    description: { type: 'string', default: '' },
    audio:       { type: 'string', default: '' },   // audio element id
    color:       { type: 'color',  default: '#e94560' },
    radius:      { type: 'number', default: 0.22 }
  },

  init() {
    const d = this.data;

    // ── Outer glow shell ──────────────────────────────────────
    this.glow = document.createElement('a-sphere');
    this.glow.setAttribute('radius', d.radius * 1.5);
    this.glow.setAttribute('material', {
      color:       d.color,
      opacity:     0.18,
      transparent: true,
      shader:      'flat'
    });
    this.glow.setAttribute('animation', {
      property:  'scale',
      from:      '1 1 1',
      to:        '1.25 1.25 1.25',
      dir:       'alternate',
      loop:      true,
      dur:       1800,
      easing:    'easeInOutSine'
    });

    // ── Core sphere ───────────────────────────────────────────
    this.sphere = document.createElement('a-sphere');
    this.sphere.setAttribute('class',  'poi-clickable');
    this.sphere.setAttribute('radius', d.radius);
    this.sphere.setAttribute('material', {
      color:      d.color,
      emissive:   d.color,
      emissiveIntensity: 0.55,
      roughness:  0.3,
      metalness:  0.5
    });
    this.sphere.setAttribute('animation__pulse', {
      property: 'components.material.material.emissiveIntensity',
      from:     0.35,
      to:       0.9,
      dir:      'alternate',
      loop:     true,
      dur:      900,
      easing:   'easeInOutSine'
    });
    this.sphere.setAttribute('shadow', 'cast: true');

    // ── Label ─────────────────────────────────────────────────
    this.label = document.createElement('a-text');
    this.label.setAttribute('value',    d.title);
    this.label.setAttribute('align',    'center');
    this.label.setAttribute('color',    '#ffffff');
    this.label.setAttribute('width',    2);
    this.label.setAttribute('position', `0 ${d.radius * 1.9 + 0.12} 0`);

    // ── Raycaster target ──────────────────────────────────────
    this.sphere.setAttribute('poi-marker', '');  // tag for raycaster
    this.el.setAttribute('poi-marker-target', '');

    // Append children
    this.el.appendChild(this.glow);
    this.el.appendChild(this.sphere);
    this.el.appendChild(this.label);

    // ── Click / cursor events ─────────────────────────────────
    this.sphere.addEventListener('click',      () => this.activate());
    this.sphere.addEventListener('mouseenter', () => this.onHoverEnter());
    this.sphere.addEventListener('mouseleave', () => this.onHoverLeave());

    // Fuse (gaze) on the whole entity
    this.el.addEventListener('click', () => this.activate());

    // Expose for raycaster
    this._currentAudio = null;
  },

  activate() {
    const d = this.data;
    const panel    = document.getElementById('info-panel');
    const titleEl  = document.getElementById('panel-title');
    const descEl   = document.getElementById('panel-desc');
    const audioInd = document.getElementById('audio-indicator');
    const audioSt  = document.getElementById('audio-status');

    titleEl.textContent = d.title;
    descEl.textContent  = d.description;
    panel.classList.add('visible');

    // ── Stop any playing audio ────────────────────────────────
    if (window._activePoi && window._activePoi !== this) {
      window._activePoi.stopAudio();
    }
    window._activePoi = this;

    // ── Play new audio ────────────────────────────────────────
    if (d.audio) {
      const audioEl = document.getElementById(d.audio);
      if (audioEl) {
        audioEl.currentTime = 0;
        audioEl.play().then(() => {
          audioInd.classList.remove('idle');
          audioSt.textContent = 'Audio playing…';
          this._currentAudio = audioEl;
          audioEl.onended = () => {
            audioInd.classList.add('idle');
            audioSt.textContent = 'Audio finished';
          };
        }).catch(() => {
          audioInd.classList.add('idle');
          audioSt.textContent = 'Tap to play audio';
        });
      }
    } else {
      audioInd.classList.add('idle');
      audioSt.textContent = 'No audio for this stop';
    }
  },

  stopAudio() {
    if (this._currentAudio) {
      this._currentAudio.pause();
      this._currentAudio.currentTime = 0;
      this._currentAudio = null;
    }
  },

  onHoverEnter() {
    this.sphere.setAttribute('animation__hover', {
      property: 'scale',
      to:       '1.2 1.2 1.2',
      dur:      200,
      easing:   'easeOutQuad'
    });
  },

  onHoverLeave() {
    this.sphere.setAttribute('animation__hover', {
      property: 'scale',
      to:       '1 1 1',
      dur:      200,
      easing:   'easeOutQuad'
    });
  }
});

// ─────────────────────────────────────────────────────────────
//  Close button
// ─────────────────────────────────────────────────────────────
document.getElementById('close-btn').addEventListener('click', () => {
  document.getElementById('info-panel').classList.remove('visible');
  if (window._activePoi) {
    window._activePoi.stopAudio();
    window._activePoi = null;
  }
  const audioInd = document.getElementById('audio-indicator');
  const audioSt  = document.getElementById('audio-status');
  audioInd.classList.add('idle');
  audioSt.textContent = 'No audio';
});

// ─────────────────────────────────────────────────────────────
//  Loading screen dismiss
// ─────────────────────────────────────────────────────────────
const scene = document.getElementById('main-scene');
const loadingScreen = document.getElementById('loading-screen');

function hideLoader() {
  setTimeout(() => {
    loadingScreen.classList.add('hidden');
    setTimeout(() => { loadingScreen.style.display = 'none'; }, 700);
  }, 400);
}

scene.addEventListener('loaded', hideLoader);

// Fallback: hide after 6 s even if model never loads
setTimeout(hideLoader, 6000);

// ─────────────────────────────────────────────────────────────
//  Gaze cursor: only show on mobile / no-VR
// ─────────────────────────────────────────────────────────────
const gazeCursor = document.getElementById('gaze-cursor');
if (!isMobile) {
  gazeCursor.setAttribute('visible', false);
  gazeCursor.removeAttribute('cursor');
}

// Re-enable gaze cursor when entering VR (Quest headset)
scene.addEventListener('enter-vr', () => {
  gazeCursor.setAttribute('visible', false); // hands handle it
});
scene.addEventListener('exit-vr', () => {
  if (isMobile) gazeCursor.setAttribute('visible', true);
});

// ─────────────────────────────────────────────────────────────
//  Raycaster: make desktop mouse click POIs
// ─────────────────────────────────────────────────────────────
if (!isMobile) {
  const cam = document.getElementById('cam');
  cam.setAttribute('raycaster', 'objects: .poi-clickable; interval: 60');
  cam.setAttribute('cursor', 'rayOrigin: mouse');
}
</script>

</body>
</html>
